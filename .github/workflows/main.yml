name: Build Password Generator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4
      
      - name: فك ضغط المشروع
        run: |
          unzip "password-generator-with-login.zip" -d project/
          ls -la project/
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'project/package-lock.json'
      
      - name: تثبيت الاعتماديات
        run: |
          cd project
          npm install
      
      - name: بناء المشروع
        run: |
          cd project
          npm run build
          ls -la dist/
      
      - name: تجهير ملفات APK
        run: |
          mkdir -p app/src/main/assets
          cp -r project/dist/* app/src/main/assets/
          ls -la app/src/main/assets/
      
      - name: توليد أيقونة افتراضية
        run: |
          mkdir -p app/src/main/res/drawable
          # إنشاء أيقونة بسيطة بلون بنفسجي (مناسبة لمولد كلمات المرور)
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:'#6C63FF' \
            -fill white -font Helvetica -pointsize 200 \
            -gravity center -annotate 0 "🔐" \
            app/src/main/res/drawable/ic_launcher.png
      
      - name: بناء APK
        uses: ameer1234567890/Web-To-APK-Builder@latest
        with:
          app-name: "Password Generator"
          package-name: "com.password.generator"
          source-dir: "app/src/main/assets"
          app-icon: "app/src/main/res/drawable/ic_launcher.png"
          output-path: "password-generator.apk"
      
      - name: رفع APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Password-Generator-APK
          path: "*.apk"
