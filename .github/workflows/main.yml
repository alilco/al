name: Build Password Generator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4
      
      - name: فك ضغط المشروع
        run: |
          unzip "password-generator-with-login.zip" -d project/
          echo "محتوى المشروع:"
          ls -la project/
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: تثبيت الاعتماديات
        run: |
          cd project
          npm install
      
      - name: بناء المشروع
        run: |
          cd project
          npm run build
          echo "محتوى مجلد dist:"
          ls -la dist/
      
      - name: إعداد Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: إعداد Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses > /dev/null 2>&1 || true
          sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.0"
      
      - name: إنشاء مشروع أندرويد
        run: |
          mkdir -p MyApp/app/src/main/assets
          mkdir -p MyApp/app/src/main/res/values
          mkdir -p MyApp/app/src/main/res/drawable
          mkdir -p MyApp/app/src/main/java/com/password/generator
          
          cp -r project/dist/* MyApp/app/src/main/assets/
          
          # AndroidManifest.xml
          cat > MyApp/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="Password Generator"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # MainActivity.java
          cat > MyApp/app/src/main/java/com/password/generator/MainActivity.java << 'EOF'
          package com.password.generator;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  WebView webView = new WebView(this);
                  webView.setWebViewClient(new WebViewClient());
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setDomStorageEnabled(true);
                  
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF
          
          # ========== ملفات Gradle حديثة ==========
          
          # settings.gradle
          cat > MyApp/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PasswordGenerator"
          include ':app'
          EOF
          
          # build.gradle (المشروع)
          cat > MyApp/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF
          
          # build.gradle (التطبيق)
          cat > MyApp/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.password.generator'
              compileSdk 33
              
              defaultConfig {
                  applicationId "com.password.generator"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          EOF
          
          # gradle.properties
          cat > MyApp/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          
          # local.properties مع مسار SDK الصحيح
          echo "sdk.dir=$HOME/android-sdk" > MyApp/local.properties
      
      - name: إنشاء أيقونة
        run: |
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:'#6C63FF' \
            -fill white -pointsize 250 \
            -gravity center -annotate 0 "🔐" \
            MyApp/app/src/main/res/drawable/ic_launcher.png
          
          cat > MyApp/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Password Generator</string>
          </resources>
          EOF
      
      - name: بناء APK
        run: |
          cd MyApp
          export ANDROID_HOME=$HOME/android-sdk
          
          # استخدام Gradle wrapper بإصدار 8.2
          gradle wrapper --gradle-version 8.2
          
          # بناء APK
          ./gradlew assembleRelease
          
          # نسخ APK
          find . -name "*.apk" -type f
          cp app/build/outputs/apk/release/app-release-unsigned.apk ../password-generator.apk 2>/dev/null || \
          cp $(find . -name "*.apk" -type f | head -1) ../password-generator.apk
      
      - name: رفع APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Password-Generator-APK
          path: password-generator.apk
